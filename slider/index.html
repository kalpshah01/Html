<!DOCTYPE html>
<html>
<head>
<title>Image Slider</title>
<link rel="stylesheet" href="style.css">
<style>
    body{
  text-align:center;
  font-family:Arial;
}

.slider{
  width:600px;
  margin:auto;
}

.slider img{
  width:100%;
  height:350px;
  object-fit:cover;
}
</style>
</head>
<body>

<div class="slider">
  <img id="slide" src="./assets/images/img1.png">
  <!-- <img id="slide" src="img2.png">
  <img id="slide" src="img3.png">
  <img id="slide" src="img4.png"> -->

</div>

<button onclick="prev()">Prev</button>
<button onclick="next()">Next</button>

<script src="script.js"></script>
<script>
    let images = [
"img1.png",
"img2.png",
"img3.png",
"img4.png"
];

let index = 0;

function next(){
  index++;
  if(index >= images.length){
    index = 0;
  }
  document.getElementById("slide").src = "./assets/images/"+images[index];
}

function prev(){
  index--;
  console.log(images.length - 1);
   if(index < 0){
    index = images.length - 1;
  }
  document.getElementById("slide").src = "./assets/images/"+images[index];
}
</script>
</body>
</html>
